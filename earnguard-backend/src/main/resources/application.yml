spring:
  application:
    name: earnguard-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/earnguard}
    username: ${DB_USERNAME:earnguard}
    password: ${DB_PASSWORD:earnguard_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:EarnGuardSecretKey2026ProductionGradeMinimum256BitsLongSecretKeyForHS256Algorithm}
  expiration-ms: ${JWT_EXPIRY:86400000}

logging:
  level:
    com.earnguard: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
